# Demo 3 · Document -> Structured JSON
# Setup:
#   1. cp .env.example .env  and fill in the key(s) you'll demo.
#   2. docker compose up --build
#   3. Open http://localhost:8080
services:
  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env          # OPENAI_API_KEY, ANTHROPIC_API_KEY, GOOGLE_API_KEY
