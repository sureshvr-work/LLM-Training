services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8091:80"
    depends_on:
      - backend
