services:
  postgres:
    image: postgres:16
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"          # optional: poke the gateway directly

  backend:
    build: ./backend
    depends_on:
      - litellm
    env_file: .env
    environment:
      - LITELLM_BASE_URL=http://litellm:4000

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"            # open http://localhost:8080

volumes:
  pgdata:
