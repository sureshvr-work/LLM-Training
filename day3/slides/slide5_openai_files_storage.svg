<rect x="26" y="408" width="650" height="78" rx="11" fill="var(--amberBg)" stroke="var(--amberB)" style="fill:rgb(255, 247, 236);stroke:rgb(255, 216, 168);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="42" y="430" font-weight="600" style="fill:rgb(138, 83, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;IBM Plex Sans&quot;, sans-serif;font-size:10.5px;font-weight:600;text-anchor:start;dominant-baseline:auto">Opaque managed storage — encrypted, isolated to your org/project. The only handle is file_id; no bucket/path exposed.</text>
<text x="42" y="448" style="fill:rgb(138, 83, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;IBM Plex Sans&quot;, sans-serif;font-size:10.5px;font-weight:400;text-anchor:start;dominant-baseline:auto">Lifecycle is yours: the file lives until you ⑦ DELETE it (or an expires_after you set fires). It counts against your storage quota.</text>
<text x="42" y="466" fill="var(--redd)" font-weight="600" style="fill:rgb(138, 83, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;IBM Plex Sans&quot;, sans-serif;font-size:10.5px;font-weight:600;text-anchor:start;dominant-baseline:auto">For PHI / regulated docs: wire the DELETE into your cleanup path so stored files don't outlive your retention policy.</text>
<text x="42" y="481" style="fill:rgb(138, 83, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;IBM Plex Sans&quot;, sans-serif;font-size:10.5px;font-weight:400;text-anchor:start;dominant-baseline:auto">Exact physical location (region/bucket) is not exposed or documented by OpenAI.</text>
