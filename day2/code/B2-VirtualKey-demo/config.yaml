# =============================================================================
# LiteLLM proxy config — Stage 1: virtual keys
# =============================================================================
# What LiteLLM does in this demo:
#   - Listens on :4000 with an OpenAI-compatible API.
#   - Apps authenticate with INTERNAL "virtual keys" (sk-internal-...).
#   - LiteLLM swaps the virtual key for the REAL OpenAI key (held here).
#   - We can revoke virtual keys live via the admin API.
#
# The single architectural lesson:
#   The real key never leaves the gateway. Apps get revocable internal
#   credentials. Same gateway pattern as your B1 demo - production tool.

model_list:
  # One model exposed to apps. "openai-chat" is the name the app uses;
  # LiteLLM maps it to the real OpenAI model and key behind the scenes.
  - model_name: openai-chat
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: anthropic-chat
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: google-chat
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY

# The proxy's own settings.
general_settings:
  # The master key - used by US (admins) to call the /key/* admin API.
  # Apps NEVER see this. Apps use the virtual keys we mint with it.
  master_key: os.environ/LITELLM_MASTER_KEY
  # Where virtual keys, spend records, and revocations are persisted.
  database_url: os.environ/DATABASE_URL