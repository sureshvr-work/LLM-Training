# =============================================================================
# Demo B2 - LiteLLM with virtual keys (B2 auth & key vault)
# =============================================================================
# Three containers:
#
#   postgres -> stores virtual keys, spend, revocations
#   litellm  -> the OpenAI-compatible gateway (production-grade)
#   app      -> the company app, holding only an INTERNAL key
#
# Setup:
#   1. Copy your real OpenAI key into the .env file in this folder
#   2. docker compose up postgres litellm
#   3. Mint a virtual key (see the lab script in the README)
#   4. Paste the virtual key into .env as INTERNAL_KEY
#   5. docker compose up app
# =============================================================================

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    # Pin the version - LiteLLM moves fast; don't let "latest" surprise you.
    image: ghcr.io/berriai/litellm:main-v1.52.0-stable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      # All three come from .env automatically - no export needed
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://litellm:litellm@postgres:5432/litellm
      - UI_USERNAME=admin
      - UI_PASSWORD=admin
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]

  app:
    build: ./app
    depends_on:
      - litellm
    environment:
      - INTERNAL_KEY=${INTERNAL_KEY}
      - GATEWAY_URL=http://litellm:4000
      - PYTHONUNBUFFERED=1