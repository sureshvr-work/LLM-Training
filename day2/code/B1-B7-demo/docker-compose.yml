# Demo B1 — Explicit guardrail gateway
#
# Two containers:
#   gateway  — the guardrail (FastAPI). Holds the real API key. Enforces rules.
#   app      — the company app (plain Python). No API key. Calls gateway only.
#
# Usage:
#   1. Copy .env.example to .env and add your OpenAI key.
#   2. docker compose up --build
#   3. Watch the gateway log every request and decision.
#   4. cat traces/trace.jsonl   (on your host machine, after the run)
#
# Port mapping:  host:8001  →  gateway container:8000
# To call the gateway from your host terminal:
#   curl http://localhost:8001/health
#   curl http://localhost:8001/v1/chat/completions ...

services:
  gateway:
    build: gateway
    ports:
      - "8001:8000"
    environment:
      # The real LLM key lives HERE, in the gateway - not in the app.
      # Put your key in a file called .env next to this file.
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # Mount ./traces on your host so you can read trace.jsonl after the run.
      - ./traces:/app/traces
  app:
    build: app
    depends_on:
      - gateway
      # NOTE: depends_on only waits for the gateway CONTAINER to start,
      # not for uvicorn inside it to finish booting.
      # app.py handles this by polling /health until the gateway answers.