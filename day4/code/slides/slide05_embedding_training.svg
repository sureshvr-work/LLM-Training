<svg width="100%" viewBox="0 0 820 878" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How an embedding model is trained: data comes from public internet, licensed, and human sources; the same corpus trains a generator (sampling) or an embedder (deterministic); training leaves a frozen embedding table where each row is one token's list of numbers, plus encoder weights that blend a token with its neighbours.</title>
<defs>
<marker id="b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M1.5 1L8.5 5L1.5 9" fill="none" stroke="#185FA5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M1.5 1L8.5 5L1.5 9" fill="none" stroke="#C7891C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M1.5 1L8.5 5L1.5 9" fill="none" stroke="#C0392B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M1.5 1L8.5 5L1.5 9" fill="none" stroke="#0F6E56" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
 text{font-family:sans-serif}.mono{font-family:monospace}
 .h1{fill:#2c6fb0}.h2{fill:#7aa9d6}.h3{fill:#bed5ec}.h4{fill:#efece4}.h5{fill:#f3c9b6}.h6{fill:#e08a6a}.h7{fill:#c0532f}
 .an{font-style:italic;fill:#5F5E5A}
</style>
</defs>
<rect x="0" y="0" width="820" height="878" fill="#FFFFFF"/>

<text x="410" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1d3a5f">How an embedding model is trained — and where its "dictionary" comes from</text>
<text x="410" y="52" text-anchor="middle" font-size="11" fill="#5F5E5A">Training happens once, up front. At run time, step ① is just a <tspan font-weight="600">lookup</tspan> — so let's see what training builds.</text>

<!-- ① DATA SOURCES -->
<rect x="20" y="70" width="780" height="200" rx="10" fill="#FFFFFF" stroke="#EF9F27" stroke-width="1.4"/>
<rect x="20" y="70" width="780" height="24" rx="10" fill="#FAEEDA"/><rect x="20" y="84" width="780" height="10" fill="#FAEEDA"/>
<text x="34" y="86" font-size="11" font-weight="700" fill="#854F0B">① Where the training data comes from — three sources</text>
<rect x="40" y="104" width="234" height="70" rx="8" fill="#FFFDF8" stroke="#eed79f"/>
<text x="157" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#B0700A">Public internet</text>
<text x="157" y="138" text-anchor="middle" font-size="8.5" fill="#444441">freely &amp; openly accessible —</text>
<text x="157" y="151" text-anchor="middle" font-size="8.5" fill="#444441">forums, blogs, public posts,</text>
<text x="157" y="164" text-anchor="middle" font-size="8.5" fill="#444441">code repositories</text>
<rect x="286" y="104" width="234" height="70" rx="8" fill="#FFFDF8" stroke="#eed79f"/>
<text x="403" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#B0700A">Licensed third-party data</text>
<text x="403" y="138" text-anchor="middle" font-size="8.5" fill="#444441">obtained through</text>
<text x="403" y="151" text-anchor="middle" font-size="8.5" fill="#444441">partnerships &amp; agreements</text>
<text x="403" y="164" text-anchor="middle" font-size="8.5" fill="#444441">(not just scraped)</text>
<rect x="532" y="104" width="246" height="70" rx="8" fill="#FFFDF8" stroke="#eed79f"/>
<text x="655" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#B0700A">Human-provided</text>
<text x="655" y="138" text-anchor="middle" font-size="8.5" fill="#444441">data that users, human trainers</text>
<text x="655" y="151" text-anchor="middle" font-size="8.5" fill="#444441">&amp; researchers provide or</text>
<text x="655" y="164" text-anchor="middle" font-size="8.5" fill="#444441">generate</text>
<line x1="157" y1="174" x2="290" y2="196" stroke="#C7891C" stroke-width="1.4" marker-end="url(#a)"/>
<line x1="403" y1="176" x2="410" y2="194" stroke="#C7891C" stroke-width="1.4" marker-end="url(#a)"/>
<line x1="655" y1="174" x2="528" y2="196" stroke="#C7891C" stroke-width="1.4" marker-end="url(#a)"/>
<rect x="250" y="198" width="320" height="24" rx="12" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/><text x="410" y="214" text-anchor="middle" font-size="9.5" font-weight="700" fill="#854F0B">one huge training corpus (text + code)</text>
<text x="40" y="242" font-size="8.5" fill="#5F5E5A">Safeguards reduce personal information before training (e.g. privacy filters that mask names).</text>
<text x="40" y="258" font-size="8" fill="#888780">Paraphrased from OpenAI's public description of how its foundation models are developed (help.openai.com).</text>

<line x1="410" y1="270" x2="410" y2="290" stroke="#185FA5" stroke-width="2" marker-end="url(#b)"/>

<!-- ② TWO GOALS -->
<rect x="20" y="294" width="780" height="286" rx="10" fill="#FFFFFF" stroke="#185FA5" stroke-width="1.6"/>
<rect x="20" y="294" width="780" height="24" rx="10" fill="#E6EEF7"/><rect x="20" y="308" width="780" height="10" fill="#E6EEF7"/>
<text x="34" y="310" font-size="11" font-weight="700" fill="#1d3a5f">② Same corpus, two goals — why a generator rolls dice and an embedder never does</text>
<text x="410" y="334" text-anchor="middle" font-size="9" fill="#5F5E5A">Both first <tspan font-weight="600">pretrain</tspan> on the same pile of text, then <tspan font-weight="600">refine</tspan> with human / curated data. They differ in the GOAL they're trained toward:</text>

<!-- generator -->
<rect x="40" y="346" width="362" height="216" rx="8" fill="#FFFFFF" stroke="#C0392B" stroke-width="1.2"/>
<rect x="40" y="346" width="362" height="22" rx="8" fill="#FBE6E2"/><rect x="40" y="358" width="362" height="10" fill="#FBE6E2"/>
<text x="52" y="361" font-size="10" font-weight="700" fill="#C0392B">GENERATOR  (decoder)</text>
<rect x="320" y="350" width="74" height="15" rx="7.5" fill="#C0392B"/><text x="357" y="361" text-anchor="middle" font-size="8" font-weight="700" fill="#FFFFFF">SAMPLING</text>
<text x="56" y="386" font-size="9.5" font-weight="700" fill="#444441">Goal: predict the NEXT token, over and over.</text>
<text x="56" y="404" font-size="8.5" fill="#5F5E5A">It ends with a score for every word in the vocabulary:</text>
<rect x="70" y="414" width="14" height="38" fill="#185FA5"/><rect x="92" y="430" width="14" height="22" fill="#7aa9d6"/><rect x="114" y="438" width="14" height="14" fill="#bed5ec"/><rect x="136" y="444" width="14" height="8" fill="#d8e3ef"/><rect x="158" y="447" width="14" height="5" fill="#e6ecf2"/>
<text x="115" y="464" font-size="7.5" fill="#888780">a probability over the whole vocabulary</text>
<rect x="210" y="416" width="32" height="32" rx="7" fill="#FFFFFF" stroke="#C0392B" stroke-width="1.4"/><circle cx="218" cy="424" r="2.4" fill="#C0392B"/><circle cx="234" cy="424" r="2.4" fill="#C0392B"/><circle cx="226" cy="432" r="2.4" fill="#C0392B"/><circle cx="218" cy="440" r="2.4" fill="#C0392B"/><circle cx="234" cy="440" r="2.4" fill="#C0392B"/>
<text x="258" y="430" font-size="8.5" font-weight="700" fill="#C0392B">pick one with a</text><text x="258" y="442" font-size="8.5" font-weight="700" fill="#C0392B">weighted dice roll</text>
<text x="56" y="486" font-size="8.5" fill="#5F5E5A">…and that dice is where <tspan font-weight="600" fill="#C0392B">temperature &amp; top_p</tspan> live.</text>
<rect x="56" y="498" width="330" height="48" rx="6" fill="#FBE6E2"/><text x="66" y="516" font-size="8.5" fill="#444441">Output: <tspan font-weight="700">many tokens</tspan>, one at a time →</text><text x="66" y="532" font-size="8.5" class="mono" fill="#C0392B">"the classic NYC cheese slice."</text>

<!-- embedder -->
<rect x="418" y="346" width="362" height="216" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1.2"/>
<rect x="418" y="346" width="362" height="22" rx="8" fill="#E1F5EE"/><rect x="418" y="358" width="362" height="10" fill="#E1F5EE"/>
<text x="430" y="361" font-size="10" font-weight="700" fill="#0F6E56">EMBEDDER  (encoder)</text>
<rect x="676" y="350" width="98" height="15" rx="7.5" fill="#0F6E56"/><text x="725" y="361" text-anchor="middle" font-size="8" font-weight="700" fill="#FFFFFF">DETERMINISTIC</text>
<text x="434" y="386" font-size="9.5" font-weight="700" fill="#444441">Goal: put similar texts NEAR each other.</text>
<text x="434" y="404" font-size="8.5" fill="#5F5E5A">Trained on pairs — pull same-meaning together,</text>
<text x="434" y="416" font-size="8.5" fill="#5F5E5A">push unrelated apart:</text>
<circle cx="470" cy="450" r="6" fill="#1D9E75"/><circle cx="498" cy="456" r="6" fill="#1D9E75"/>
<line x1="478" y1="451" x2="490" y2="454" stroke="#0F6E56" stroke-width="1.4" marker-end="url(#g)"/><line x1="490" y1="455" x2="478" y2="452" stroke="#0F6E56" stroke-width="1.4" marker-end="url(#g)"/>
<text x="484" y="476" text-anchor="middle" font-size="7.5" fill="#0F6E56">same meaning → pulled together</text>
<circle cx="640" cy="448" r="6" fill="#C0392B"/><line x1="648" y1="448" x2="668" y2="448" stroke="#C0392B" stroke-width="1.4" marker-end="url(#r)"/>
<text x="648" y="476" text-anchor="middle" font-size="7.5" fill="#C0392B">unrelated → pushed apart</text>
<text x="434" y="498" font-size="8.5" fill="#5F5E5A">It never learns to pick a next word — so there is</text>
<text x="434" y="510" font-size="8.5" fill="#5F5E5A">no vocabulary score and <tspan font-weight="700" fill="#0F6E56">no dice.</tspan></text>
<rect x="434" y="520" width="330" height="26" rx="6" fill="#E1F5EE"/><text x="444" y="537" font-size="8.5" fill="#444441">Output: <tspan font-weight="700" fill="#0F6E56">ONE vector</tspan> · same text → same vector.</text>

<text x="410" y="573" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1d3a5f">Same raw text. Different training goal — that's the whole reason one <tspan fill="#C0392B">samples</tspan> and the other is <tspan fill="#0F6E56">deterministic</tspan>.</text>

<line x1="410" y1="580" x2="410" y2="600" stroke="#7B3FA0" stroke-width="2" marker-end="url(#b)"/>

<!-- ③ WHAT TRAINING LEAVES BEHIND -->
<rect x="20" y="604" width="780" height="258" rx="10" fill="#FFFFFF" stroke="#7B3FA0" stroke-width="1.6"/>
<rect x="20" y="604" width="780" height="24" rx="10" fill="#F0E8F8"/><rect x="20" y="618" width="780" height="10" fill="#F0E8F8"/>
<text x="34" y="620" font-size="11" font-weight="700" fill="#7B3FA0">③ What embedding training leaves behind — two things</text>

<!-- 1) dictionary (left lane: x40–400) -->
<text x="40" y="646" font-size="10" font-weight="700" fill="#7B3FA0">1 · The dictionary (embedding table)</text>
<text x="46" y="666" font-size="8" font-weight="600" fill="#888780">token</text>
<text x="110" y="666" font-size="8" font-weight="600" fill="#888780">its list of numbers  (read the row left → right)</text>
<rect x="106" y="671" width="262" height="46" rx="4" fill="#F1FAF5" stroke="#1D9E75" stroke-width="1.4" stroke-dasharray="4 2"/>
<text x="46" y="685" class="mono" font-size="9" fill="#444441">cat</text>
<rect x="110" y="674" width="48" height="18" rx="2" class="h5"/><text x="134" y="687" text-anchor="middle" class="mono" font-size="8" fill="#3a2f2a">0.21</text>
<rect x="160" y="674" width="48" height="18" rx="2" class="h6"/><text x="184" y="687" text-anchor="middle" class="mono" font-size="8" fill="#3a2f2a">0.55</text>
<rect x="210" y="674" width="48" height="18" rx="2" class="h3"/><text x="234" y="687" text-anchor="middle" class="mono" font-size="8" fill="#23303f">−0.10</text>
<rect x="260" y="674" width="48" height="18" rx="2" class="h6"/><text x="284" y="687" text-anchor="middle" class="mono" font-size="8" fill="#3a2f2a">0.48</text>
<rect x="310" y="674" width="48" height="18" rx="2" class="h2"/><text x="334" y="687" text-anchor="middle" class="mono" font-size="8" fill="#23303f">−0.33</text>
<text x="375" y="699" font-size="13" font-weight="700" fill="#0F6E56">≈</text>
<text x="46" y="707" class="mono" font-size="9" fill="#444441">dog</text>
<rect x="110" y="696" width="48" height="18" rx="2" class="h5"/><text x="134" y="709" text-anchor="middle" class="mono" font-size="8" fill="#3a2f2a">0.19</text>
<rect x="160" y="696" width="48" height="18" rx="2" class="h6"/><text x="184" y="709" text-anchor="middle" class="mono" font-size="8" fill="#3a2f2a">0.58</text>
<rect x="210" y="696" width="48" height="18" rx="2" class="h3"/><text x="234" y="709" text-anchor="middle" class="mono" font-size="8" fill="#23303f">−0.07</text>
<rect x="260" y="696" width="48" height="18" rx="2" class="h6"/><text x="284" y="709" text-anchor="middle" class="mono" font-size="8" fill="#3a2f2a">0.45</text>
<rect x="310" y="696" width="48" height="18" rx="2" class="h2"/><text x="334" y="709" text-anchor="middle" class="mono" font-size="8" fill="#23303f">−0.29</text>
<text x="46" y="731" class="mono" font-size="9" fill="#444441">car</text>
<rect x="110" y="720" width="48" height="18" rx="2" class="h2"/><text x="134" y="733" text-anchor="middle" class="mono" font-size="8" fill="#23303f">−0.40</text>
<rect x="160" y="720" width="48" height="18" rx="2" class="h4"/><text x="184" y="733" text-anchor="middle" class="mono" font-size="8" fill="#444441">0.05</text>
<rect x="210" y="720" width="48" height="18" rx="2" class="h7"/><text x="234" y="733" text-anchor="middle" class="mono" font-size="8" fill="#ffffff">0.70</text>
<rect x="260" y="720" width="48" height="18" rx="2" class="h1"/><text x="284" y="733" text-anchor="middle" class="mono" font-size="8" fill="#ffffff">−0.62</text>
<rect x="310" y="720" width="48" height="18" rx="2" class="h5"/><text x="334" y="733" text-anchor="middle" class="mono" font-size="8" fill="#3a2f2a">0.22</text>
<text x="372" y="731" font-size="13" font-weight="700" fill="#C0392B">≠</text>
<text x="46" y="754" font-size="8.5" font-weight="700" fill="#1d3a5f">one ROW = one token's vector · one CELL = one number.</text>
<text x="46" y="766" font-size="8.5" fill="#C0392B">A single number means nothing alone — none is a "feature".</text>
<text x="46" y="778" font-size="8.5" fill="#0F6E56">Similar = close in EVERY slot: cat ≈ dog all across, car not.</text>

<!-- 2) encoder weights (right lane: x420–780) -->
<line x1="404" y1="640" x2="404" y2="782" stroke="#ece6fa" stroke-width="1.4"/>
<text x="424" y="646" font-size="10" font-weight="700" fill="#7B3FA0">2 · The encoder weights</text>
<rect x="420" y="658" width="360" height="84" rx="8" fill="#FAF7FD" stroke="#d4c6f1"/>
<text x="600" y="673" text-anchor="middle" font-size="7.5" fill="#7B3FA0">learned "who should listen to whom" in a sentence</text>
<path d="M683 701 C672 689 661 689 650 701" fill="none" stroke="#7B3FA0" stroke-width="2"/>
<path d="M683 701 C662 685 644 685 621 701" fill="none" stroke="#b59ad6" stroke-width="1.1"/>
<path d="M683 701 C642 682 600 682 571 701" fill="none" stroke="#cdbbe6" stroke-width="1"/>
<rect x="500" y="701" width="26" height="18" rx="4" fill="#F5F4F2" stroke="#C9C6BC"/><text x="513" y="714" text-anchor="middle" class="mono" font-size="8" fill="#444441">the</text>
<rect x="528" y="701" width="28" height="18" rx="4" fill="#F5F4F2" stroke="#C9C6BC"/><text x="542" y="714" text-anchor="middle" class="mono" font-size="8" fill="#444441">cat</text>
<rect x="558" y="701" width="26" height="18" rx="4" fill="#F5F4F2" stroke="#C9C6BC"/><text x="571" y="714" text-anchor="middle" class="mono" font-size="8" fill="#444441">sat</text>
<rect x="586" y="701" width="20" height="18" rx="4" fill="#F5F4F2" stroke="#C9C6BC"/><text x="596" y="714" text-anchor="middle" class="mono" font-size="8" fill="#444441">on</text>
<rect x="608" y="701" width="26" height="18" rx="4" fill="#F5F4F2" stroke="#C9C6BC"/><text x="621" y="714" text-anchor="middle" class="mono" font-size="8" fill="#444441">the</text>
<rect x="636" y="701" width="28" height="18" rx="4" fill="#F5F4F2" stroke="#C9C6BC"/><text x="650" y="714" text-anchor="middle" class="mono" font-size="8" fill="#444441">car</text>
<rect x="666" y="701" width="34" height="18" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1.3"/><text x="683" y="714" text-anchor="middle" class="mono" font-size="8" font-weight="700" fill="#0F6E56">seat</text>
<text x="600" y="734" text-anchor="middle" font-size="7.5" fill="#5F5E5A">"seat" listens most to "car" → a car seat, not a chair</text>
<text x="424" y="760" font-size="8.5" fill="#444441">Each token's numbers are adjusted by its <tspan font-weight="700" fill="#7B3FA0">neighbours</tspan>.</text>
<text x="424" y="772" font-size="8.5" fill="#5F5E5A">"seat" beside "car" → a car seat. Used in step ②, not ①.</text>

<!-- run time bar -->
<rect x="40" y="790" width="740" height="56" rx="8" fill="#FAFAF8" stroke="#1d3a5f" stroke-width="1.2"/>
<text x="52" y="808" font-size="10" font-weight="700" fill="#1d3a5f">At run time, the two are used in different steps:</text>
<text x="52" y="826" font-size="9" fill="#444441"><tspan font-weight="700" fill="#7B3FA0">step ①</tspan> — look up each token's ROW in the dictionary  (a pure lookup, no neighbours yet).</text>
<text x="52" y="840" font-size="9" fill="#444441"><tspan font-weight="700" fill="#7B3FA0">step ②</tspan> — apply the encoder weights to blend each row with its neighbours' rows.</text>

</svg>
