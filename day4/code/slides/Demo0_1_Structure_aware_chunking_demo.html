<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Structure-aware chunking — live demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f2ec;--card:#fff;--ink:#23262e;--muted:#7b8190;--line:#e7e4dc;
    --navy:#1d3a5f;--accent:#5f3dc4;--accent-soft:#ece6fa;--amber:#c9881a;--amber-line:#e0a008;
    --c0:#E6F1FB;--c0b:#b9d6f2;--c1:#E3F5EC;--c1b:#b6e3cd;--c2:#FBF1DA;--c2b:#eed79f;
    --c3:#EFEAFB;--c3b:#d4c6f1;--c4:#FBE7EC;--c4b:#f2c2cd;--c5:#E7F6F0;--c5b:#bfe6d5;
    --sans:'IBM Plex Sans',system-ui,sans-serif;--serif:'Spectral',Georgia,serif;--mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(900px 500px at 12% -10%,#fff 0%,rgba(255,255,255,0) 60%),var(--paper);
    color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1240px;margin:0 auto;padding:26px 26px 60px}
  header{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:20px}
  h1{font-family:var(--serif);font-weight:600;color:var(--navy);font-size:30px;margin:0 0 4px;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13.5px;margin:0}
  .docchip{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px}
  .docchip .ic{width:26px;height:32px;border:1.5px solid var(--navy);border-radius:3px;position:relative;flex:none}
  .docchip .ic:before{content:"";position:absolute;inset:5px 5px auto 5px;height:2px;background:#9fb3cc;box-shadow:0 5px #9fb3cc,0 10px #9fb3cc}
  .docchip b{font-size:13px;color:var(--navy)}.docchip span{font-size:11.5px;color:var(--muted);font-family:var(--mono)}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tab{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 14px 8px 9px;font-size:13px;font-weight:600;color:#4b5160;cursor:pointer;transition:.18s;user-select:none}
  .tab .n{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;background:#eef0f3;color:#6b7280}
  .tab:hover{border-color:#cfd3da;transform:translateY(-1px)}
  .tab.on{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 6px 16px -8px rgba(29,58,95,.6)}
  .tab.on .n{background:rgba(255,255,255,.22);color:#fff}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:0 1px 2px rgba(16,24,40,.04);margin-bottom:18px}
  .pname{display:flex;align-items:center;gap:10px}
  .dot{width:11px;height:11px;border-radius:50%}
  .pname h2{margin:0;font-size:17px;font-family:var(--serif);font-weight:600}
  .pill{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent)}
  .pdesc{color:#565c69;font-size:13px;margin:6px 0 0;max-width:620px;line-height:1.5}
  .puse{color:var(--muted);font-size:12px;margin:3px 0 0}.puse b{color:#5b6270;font-weight:600}
  .controls{display:flex;gap:26px;flex-wrap:wrap;margin-top:16px;align-items:center}
  .ctrl{min-width:230px;flex:1}
  .ctrl label{display:flex;justify-content:space-between;font-size:12px;color:#5b6270;font-weight:600;margin-bottom:7px}
  .ctrl label .v{font-family:var(--mono);color:var(--navy);background:#f1f3f6;border-radius:6px;padding:1px 7px}
  input[type=range]{width:100%;-webkit-appearance:none;height:5px;border-radius:5px;background:#e6e2da;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid #fff;box-shadow:0 1px 4px rgba(95,61,196,.4)}
  .note{font-size:12px;color:var(--muted);font-style:italic}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;padding-top:16px;border-top:1px dashed var(--line)}
  .stat{background:#f7f8fa;border:1px solid var(--line);border-radius:10px;padding:8px 12px;min-width:78px}
  .stat .k{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .stat .val{font-family:var(--mono);font-size:18px;color:var(--navy);font-weight:500;line-height:1.2}
  .stat.flag .val{font-size:14px}
  .stat.good{background:#e9f6ef;border-color:#bfe6d5}.stat.good .val{color:#0F6E56}
  .stat.bad{background:#fdecec;border-color:#f3c9c9}.stat.bad .val{color:#b23030}
  .maptitle{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 7px}
  .map{display:flex;height:26px;border-radius:7px;overflow:hidden;border:1px solid var(--line);background:#fff}
  .seg{height:100%;border-right:1px solid rgba(255,255,255,.85);cursor:pointer;transition:filter .15s}
  .seg:last-child{border-right:none}.seg:hover{filter:brightness(.93)}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:9px}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:5px}
  .grid{display:grid;grid-template-columns:1.55fr 1fr;gap:18px;align-items:start}
  @media(max-width:920px){.grid{grid-template-columns:1fr}}
  .docwrap .bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#fbfaf7;border:1px solid var(--line);border-bottom:none;border-radius:14px 14px 0 0;font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .docwrap .bar .d{width:9px;height:9px;border-radius:50%;background:#e2ddd2}
  .doc{background:#fff;border:1px solid var(--line);border-radius:0 0 14px 14px;padding:24px 28px;font-family:var(--serif);font-size:14.5px;line-height:1.78;white-space:pre-wrap;word-wrap:break-word;max-height:70vh;overflow:auto;color:#2c313b;box-shadow:0 16px 40px -28px rgba(20,30,60,.4)}
  .doc.mono{font-family:var(--mono);font-size:12.5px;line-height:1.7}
  .chunk{border-radius:2px;padding:0 .5px;transition:outline .12s}
  .chunk.active{outline:2px solid var(--navy);outline-offset:1px;border-radius:3px}
  .hdr{background:var(--c2);border-bottom:2px solid var(--amber-line)}
  .c0{background:var(--c0)}.c1{background:var(--c1)}.c2{background:var(--c2)}.c3{background:var(--c3)}.c4{background:var(--c4)}.c5{background:var(--c5)}
  .inspect .bar{display:flex;justify-content:space-between;align-items:center;padding:0 2px 10px}
  .inspect .bar h3{margin:0;font-size:13px;color:var(--navy);font-weight:700;letter-spacing:.02em}
  .inspect .bar span{font-size:11.5px;color:var(--muted);font-family:var(--mono)}
  .chunks{display:flex;flex-direction:column;gap:8px;max-height:calc(70vh + 38px);overflow:auto;padding-right:4px}
  .cc{border:1px solid var(--line);border-left-width:4px;border-radius:9px;padding:9px 11px;background:#fff;cursor:pointer;transition:.14s}
  .cc:hover{transform:translateX(-2px);box-shadow:0 4px 14px -8px rgba(20,30,60,.3)}
  .cc.active{box-shadow:0 0 0 2px var(--navy) inset}
  .cc .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .cc .h b{font-size:12px}.cc .h em{font-style:normal;font-family:var(--mono);font-size:10.5px;color:var(--muted)}
  .cc .t{font-family:var(--mono);font-size:10.5px;color:#6a7079;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap}
  .reveal{opacity:0;transform:translateY(8px);animation:rise .5s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes rise{to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrap">
  <header class="reveal">
    <div><h1>Structure-aware chunking</h1>
      <p class="sub">Cut on the document's own structure — headings, functions, table rows — not a character count.</p></div>
    <div class="docchip"><div class="ic"></div><div><b id="docname">policy.md</b><br><span id="docmeta"></span></div></div>
  </header>
  <div class="tabs reveal" id="tabs" style="animation-delay:.05s"></div>
  <div class="panel reveal" style="animation-delay:.1s">
    <div class="pname"><span class="dot" id="pdot"></span><h2 id="pname"></h2><span class="pill" id="ppill"></span></div>
    <p class="pdesc" id="pdesc"></p>
    <p class="puse" id="puse"></p>
    <div class="controls" id="controls"></div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="panel reveal" style="animation-delay:.15s">
    <p class="maptitle">Boundary map — each block is one chunk, width ∝ size</p>
    <div class="map" id="map"></div>
    <div class="legend">
      <span><i style="background:var(--c0)"></i>colors cycle per chunk</span>
      <span><i style="background:var(--c2);border-bottom:2px solid var(--amber-line)"></i>amber = header repeated with every chunk (table-aware)</span>
    </div>
  </div>
  <div class="grid reveal" style="animation-delay:.2s">
    <div class="docwrap">
      <div class="bar"><span class="d"></span><span class="d"></span><span class="d"></span>&nbsp;<span id="srcname">policy.md</span> — source</div>
      <div class="doc" id="doc"></div>
    </div>
    <div class="inspect">
      <div class="bar"><h3>CHUNKS</h3><span id="cnote"></span></div>
      <div class="chunks" id="chunks"></div>
    </div>
  </div>
</div>

<script>
/* ---------------- apt samples ---------------- */
const SAMPLES={
prose:`# Prior Authorization Policy

## Purpose
Prior authorization confirms that a requested service is medically necessary and covered before it is delivered. Approval is not a guarantee of payment; final payment depends on eligibility at the time of service.

## Eligibility
A member must be actively enrolled on the date the service is requested and on the date it is provided. If coverage lapses between approval and service, the authorization is void. Providers should confirm eligibility before delivering an authorized service.

## Process
The prescriber submits a request with the member identifier, the service code, and clinical documentation. A coordinator checks completeness, a clinician reviews the request against the Plan's criteria, and the Plan issues a decision: approved, denied, or pended for more information.

## Timelines
Standard requests are decided within seventy-two business hours of a complete submission. Urgent requests, where delay would jeopardize the member's health, are decided within twenty-four hours. If the Plan needs more information, the clock pauses until it arrives.`,
code:`"""Fixed-size chunking utilities."""
import re

CHUNK_SIZE = 600


class Chunker:
    """Splits text into fixed-size character chunks."""

    def __init__(self, size=CHUNK_SIZE, overlap=0):
        self.size = size
        self.overlap = overlap

    def split(self, text):
        chunks = []
        step = self.size - self.overlap
        for i in range(0, len(text), step):
            chunks.append(text[i:i + self.size])
        return chunks


def count_tokens(text):
    """Rough token count: words and punctuation."""
    return len(re.findall(r"\\w+|[^\\w\\s]", text))


def main():
    doc = open("policy.txt").read()
    c = Chunker(size=500, overlap=80)
    for i, ch in enumerate(c.split(doc)):
        print(i, count_tokens(ch))`,
table:`| Code  | Service                   | Auth? | Turnaround |
| ----- | ------------------------- | ----- | ---------- |
| 70551 | MRI brain, no contrast    | Yes   | 72h        |
| 72148 | MRI lumbar spine          | Yes   | 72h        |
| 99213 | Office visit, established | No    | n/a        |
| J1745 | Infliximab injection      | Yes   | 24h        |
| 97110 | Therapeutic exercise      | No    | n/a        |
| 43239 | Upper GI endoscopy        | Yes   | 72h        |`
};
const FILES={prose:"policy.md",code:"chunker.py",table:"auth_codes.md"};
const SEPS=["\n\n","\n",". "," ",""];

/* ---------------- strategies ---------------- */
const STRATS={
 recursive:{name:"Recursive character",pill:"separators",color:"#3b82c4",sample:"prose",
   desc:"Splits on the biggest natural separator first (paragraph → line → sentence → word), only falling to a smaller one when a piece is still too big.",
   use:"The recommended default — keeps natural units whole while honoring a size budget.",
   ctrls:[{k:"size",label:"Max chunk size",unit:"chars",min:150,max:1000,step:25,val:300}]},
 layout:{name:"Layout-aware (Markdown)",pill:"by headings",color:"#0F6E56",sample:"prose",
   desc:"Cuts on Markdown headings so each section stays whole; an oversize section falls back to recursive splitting.",
   use:"Documents with real heading structure — policies, manuals, wikis.",
   ctrls:[{k:"max",label:"Max section size",unit:"chars",min:150,max:1200,step:25,val:600}]},
 code:{name:"Code-aware",pill:"by def / class",color:"#6b3fa0",sample:"code",
   desc:"Keeps each top-level function and class whole; the module preamble (docstring, imports, constants) is its own chunk.",
   use:"Source code — a function body is meaningless without its signature.",
   ctrls:[],staticNote:"One function / class per chunk — no size dial."},
 table:{name:"Table-aware",pill:"by rows",color:"#c9881a",sample:"table",
   desc:"Keeps each row intact and repeats the header with every chunk, so each chunk is self-describing.",
   use:"Tables & spreadsheets — a row split mid-way becomes meaningless.",
   ctrls:[{k:"rows",label:"Rows / chunk",unit:"rows",min:1,max:4,step:1,val:2}]}
};
const ORDER=["recursive","layout","code","table"];
let active="recursive",activeChunk=-1,T=SAMPLES.prose;

/* ---------------- chunkers ---------------- */
function val(k){return STRATS[active].ctrls.find(c=>c.k===k).val;}
function lineStarts(s){const a=[];let o=0;s.split("\n").forEach(l=>{a.push(o);o+=l.length+1;});return a;}

function recursive(start,end,seps,size){
  if(end-start<=size)return [{start,end}];
  let sep=seps[seps.length-1],si=seps.length-1;
  for(let i=0;i<seps.length;i++){if(seps[i]===""||T.slice(start,end).includes(seps[i])){sep=seps[i];si=i;break;}}
  let pieces=[];
  if(sep===""){for(let i=start;i<end;i++)pieces.push({start:i,end:i+1});}
  else{let idx=start,p=T.indexOf(sep,start);while(p!==-1&&p<end){pieces.push({start:idx,end:p+sep.length});idx=p+sep.length;p=T.indexOf(sep,idx);}pieces.push({start:idx,end:end});}
  const rest=seps.slice(si+1).length?seps.slice(si+1):[""],out=[];let cs=null,ce=null;
  for(const pc of pieces){
    if(pc.end-pc.start>size){if(cs!==null){out.push({start:cs,end:ce});cs=null;}out.push(...recursive(pc.start,pc.end,rest,size));}
    else if(cs===null){cs=pc.start;ce=pc.end;}
    else if(pc.end-cs<=size){ce=pc.end;}
    else{out.push({start:cs,end:ce});cs=pc.start;ce=pc.end;}
  }
  if(cs!==null)out.push({start:cs,end:ce});
  return out;
}
function layout(maxSize){
  const re=/^#{1,6} .*$/gm;let m,heads=[];while((m=re.exec(T)))heads.push(m.index);
  if(!heads.length||heads[0]>0)heads.unshift(0);heads.push(T.length);
  const out=[];for(let i=0;i<heads.length-1;i++){const s=heads[i],e=heads[i+1];
    if(e-s<=maxSize)out.push({start:s,end:e});else out.push(...recursive(s,e,SEPS,maxSize));}
  return out;
}
function codeChunks(){
  const lines=T.split("\n"),starts=lineStarts(T),bs=[0];
  for(let i=0;i<lines.length;i++){if(/^(class |def |async def )/.test(lines[i])&&starts[i]!==0)bs.push(starts[i]);}
  const u=[...new Set(bs)].sort((a,b)=>a-b);u.push(T.length);
  const out=[];for(let i=0;i<u.length-1;i++)out.push({start:u[i],end:u[i+1]});return out;
}
function tableChunks(rows){
  const lines=T.split("\n"),starts=lineStarts(T);
  const header={start:0,end:starts[2]};
  const data=[];for(let i=2;i<lines.length;i++)if(lines[i].trim()!=="")data.push(i);
  const out=[];for(let i=0;i<data.length;i+=rows){const f=data[i],l=data[Math.min(i+rows,data.length)-1];
    out.push({start:starts[f],end:(l+1<lines.length)?starts[l+1]:T.length});}
  return {chunks:out,header};
}
function compute(){
  T=SAMPLES[STRATS[active].sample];
  if(active==="recursive")return {chunks:recursive(0,T.length,SEPS,val("size"))};
  if(active==="layout")return {chunks:layout(val("max"))};
  if(active==="code")return {chunks:codeChunks()};
  return tableChunks(val("rows"));
}

/* ---------------- rendering ---------------- */
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const colorOf=i=>'c'+(i%6);
function renderTabs(){document.getElementById('tabs').innerHTML=ORDER.map((k,i)=>
  `<div class="tab${k===active?' on':''}" data-k="${k}"><span class="n">${i+1}</span>${STRATS[k].name}</div>`).join('');}
function renderControls(){
  const s=STRATS[active];
  document.getElementById('pdot').style.background=s.color;
  document.getElementById('pname').textContent=s.name;
  document.getElementById('ppill').textContent=s.pill;
  document.getElementById('pdesc').textContent=s.desc;
  document.getElementById('puse').innerHTML="<b>Use when:</b> "+s.use;
  let html=s.ctrls.map(c=>`<div class="ctrl"><label>${c.label}<span class="v" id="v_${c.k}">${c.val} ${c.unit}</span></label>
    <input type="range" data-k="${c.k}" min="${c.min}" max="${c.max}" step="${c.step}" value="${c.val}"></div>`).join('');
  if(s.staticNote)html+=`<div class="note">${s.staticNote}</div>`;
  document.getElementById('controls').innerHTML=html;
  document.querySelectorAll('#controls input').forEach(inp=>inp.addEventListener('input',e=>{
    const k=e.target.dataset.k,c=s.ctrls.find(x=>x.k===k);c.val=+e.target.value;
    document.getElementById('v_'+k).textContent=c.val+' '+c.unit;refresh();}));
}
function renderDoc(res){
  const chunks=res.chunks,header=res.header;
  document.getElementById('doc').className='doc'+(STRATS[active].sample!=='prose'?' mono':'');
  const pts=new Set([0,T.length]);chunks.forEach(c=>{pts.add(c.start);pts.add(c.end);});
  if(header){pts.add(header.start);pts.add(header.end);}
  const P=[...pts].filter(p=>p>=0&&p<=T.length).sort((a,b)=>a-b);let html="";
  for(let k=0;k<P.length-1;k++){const a=P[k],b=P[k+1];if(a>=b)continue;
    if(header&&a>=header.start&&b<=header.end){html+=`<span class="hdr" title="header — repeated with every chunk">${esc(T.slice(a,b))}</span>`;continue;}
    let idx=-1;chunks.forEach((c,i)=>{if(idx<0&&c.start<=a&&b<=c.end)idx=i;});
    if(idx<0){html+=esc(T.slice(a,b));continue;}
    html+=`<span class="chunk ${colorOf(idx)}" data-ci="${idx}">${esc(T.slice(a,b))}</span>`;}
  document.getElementById('doc').innerHTML=html;
}
function renderMap(res){
  const chunks=res.chunks,tot=chunks.reduce((s,c)=>s+(c.end-c.start),0);
  document.getElementById('map').innerHTML=chunks.map((c,i)=>
    `<div class="seg" data-ci="${i}" title="chunk ${i+1} · ${c.end-c.start} chars" style="width:${(c.end-c.start)/tot*100}%;background:var(--${colorOf(i)})"></div>`).join('');
}
function renderList(res){
  const chunks=res.chunks,header=res.header;
  document.getElementById('cnote').textContent=chunks.length+" chunks"+(header?" (+ header each)":"");
  const hdrTxt=header?T.slice(header.start,header.end).trim():"";
  document.getElementById('chunks').innerHTML=chunks.map((c,i)=>{
    let txt=T.slice(c.start,c.end).replace(/\n+/g,' ').trim();
    const pre=header?`⟨header⟩ `:"";
    return `<div class="cc" data-ci="${i}" style="border-left-color:var(--${colorOf(i)}b)">
      <div class="h"><b>Chunk ${i+1}</b><em>${c.end-c.start} chars</em></div>
      <div class="t">${esc(pre+txt).slice(0,150)}…</div></div>`;}).join('');
}
function renderStats(res){
  const chunks=res.chunks,sizes=chunks.map(c=>c.end-c.start);
  const avg=Math.round(sizes.reduce((a,b)=>a+b,0)/chunks.length),mn=Math.min(...sizes),mx=Math.max(...sizes);
  let mid=false;chunks.forEach(c=>{if(c.end<T.length){if(/\w/.test(T[c.end-1])&&/\w/.test(T[c.end]))mid=true;}});
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="k">chunks</div><div class="val">${chunks.length}</div></div>
     <div class="stat"><div class="k">avg size</div><div class="val">${avg}</div></div>
     <div class="stat"><div class="k">smallest</div><div class="val">${mn}</div></div>
     <div class="stat"><div class="k">largest</div><div class="val">${mx}</div></div>
     <div class="stat flag ${mid?'bad':'good'}"><div class="k">mid-word cuts</div><div class="val">${mid?'Yes':'No'}</div></div>
     <div class="stat flag good"><div class="k">whole units</div><div class="val">kept</div></div>`;
}
function wireHover(){document.querySelectorAll('[data-ci]').forEach(el=>{
  el.addEventListener('click',()=>setActive(+el.dataset.ci));
  el.addEventListener('mouseenter',()=>flash(+el.dataset.ci,true));
  el.addEventListener('mouseleave',()=>{if(activeChunk<0)flash(+el.dataset.ci,false);});});}
function flash(ci,on){document.querySelectorAll('.chunk[data-ci="'+ci+'"]').forEach(s=>s.classList.toggle('active',on));}
function setActive(ci){activeChunk=(activeChunk===ci)?-1:ci;
  document.querySelectorAll('.chunk,.cc').forEach(s=>s.classList.remove('active'));
  if(activeChunk>=0){document.querySelectorAll('.chunk[data-ci="'+ci+'"]').forEach(s=>s.classList.add('active'));
    const card=document.querySelector('.cc[data-ci="'+ci+'"]');if(card)card.classList.add('active');
    const f=document.querySelector('.chunk[data-ci="'+ci+'"]');if(f)f.scrollIntoView({behavior:'smooth',block:'center'});}}
function refresh(){const res=compute();
  document.getElementById('docname').textContent=FILES[STRATS[active].sample];
  document.getElementById('srcname').textContent=FILES[STRATS[active].sample];
  document.getElementById('docmeta').textContent=FILES[STRATS[active].sample]+" · "+T.length+" chars";
  renderMap(res);renderDoc(res);renderList(res);renderStats(res);activeChunk=-1;wireHover();}
function selectStrategy(k){active=k;activeChunk=-1;renderTabs();bindTabs();renderControls();refresh();}
function bindTabs(){document.getElementById('tabs').querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>selectStrategy(t.dataset.k)));}
renderTabs();bindTabs();renderControls();refresh();
</script>
</body>
</html>
