<svg width="100%" viewBox="0 0 820 628" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Retrieval and passing content to the LLM. The flow: take the question, embed it, search the store for top matching chunks, take their text and metadata, build a prompt of question plus chunks, send to the LLM, get an answer. The Search store step is a swappable slot. Dense semantic search compares vectors by cosine: closer angle means closer meaning. Sparse keyword search uses an inverted index — each word maps to the chunks that contain it — and BM25 ranks by term frequency and rarity. Hybrid runs both and fuses the two ranked lists with Reciprocal Rank Fusion. Hybrid plus a cross-encoder re-ranker is the production-grade default. Strategies are next week.</title>
<defs>
<marker id="d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1.5 1L8.5 5L1.5 9" fill="none" stroke="#444441" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M1.5 1L8.5 5L1.5 9" fill="none" stroke="#185FA5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M1.5 1L8.5 5L1.5 9" fill="none" stroke="#1D9E75" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style> text{font-family:sans-serif}.mono{font-family:monospace}.an{font-style:italic;fill:#5F5E5A}</style>
</defs>
<rect x="0" y="0" width="820" height="628" fill="#FFFFFF"/>

<text x="410" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1d3a5f">Retrieval — find the right chunks, then hand them to the LLM</text>
<text x="410" y="49" text-anchor="middle" font-size="10.5" fill="#5F5E5A">A question comes in; matching chunks come out and go into the prompt.</text>

<!-- SECTION 1: the flow -->
<rect x="20" y="60" width="780" height="22" rx="6" fill="#1d3a5f"/>
<text x="34" y="76" font-size="10.5" font-weight="700" fill="#FFFFFF">① The query-time flow</text>

<rect x="150" y="92" width="116" height="22" rx="11" fill="#F2F7FC" stroke="#185FA5" stroke-width="1.1" stroke-dasharray="4 3"/>
<text x="208" y="107" text-anchor="middle" font-size="7.5" fill="#185FA5">embedding model</text>
<line x1="186" y1="124" x2="186" y2="114" stroke="#185FA5" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#b)"/>

<rect x="32" y="124" width="76" height="40" rx="7" fill="#FFFFFF" stroke="#1d3a5f" stroke-width="1.3"/><text x="70" y="148" text-anchor="middle" font-size="9" font-weight="700" fill="#1d3a5f">Question</text>
<line x1="108" y1="144" x2="124" y2="144" stroke="#444441" stroke-width="1.5" marker-end="url(#d)"/>
<rect x="124" y="124" width="92" height="40" rx="7" fill="#E1F5EE" stroke="#5DCAA5"/><text x="170" y="141" text-anchor="middle" font-size="8.5" font-weight="700" fill="#0F6E56">Embed</text><text x="170" y="153" text-anchor="middle" font-size="8" fill="#0F6E56">the query</text>
<line x1="216" y1="144" x2="232" y2="144" stroke="#444441" stroke-width="1.5" marker-end="url(#d)"/>
<rect x="232" y="124" width="110" height="40" rx="7" fill="#E6EEF7" stroke="#185FA5" stroke-width="1.6"/><text x="287" y="141" text-anchor="middle" font-size="8.5" font-weight="700" fill="#1d3a5f">Search store</text><text x="287" y="153" text-anchor="middle" font-size="8" fill="#1d3a5f">→ top-K matches</text>
<line x1="342" y1="144" x2="358" y2="144" stroke="#444441" stroke-width="1.5" marker-end="url(#d)"/>
<rect x="358" y="124" width="120" height="40" rx="7" fill="#FFFDF8" stroke="#EF9F27"/><text x="418" y="140" text-anchor="middle" font-size="8.5" font-weight="700" fill="#854F0B">Matched chunks</text><text x="418" y="153" text-anchor="middle" font-size="8" fill="#854F0B">their TEXT + metadata</text>
<line x1="478" y1="144" x2="494" y2="144" stroke="#444441" stroke-width="1.5" marker-end="url(#d)"/>
<rect x="494" y="124" width="118" height="40" rx="7" fill="#F0E8F8" stroke="#7B3FA0"/><text x="553" y="140" text-anchor="middle" font-size="8.5" font-weight="700" fill="#7B3FA0">Build the prompt</text><text x="553" y="153" text-anchor="middle" font-size="8" fill="#7B3FA0">question + chunks</text>
<line x1="612" y1="144" x2="628" y2="144" stroke="#444441" stroke-width="1.5" marker-end="url(#d)"/>
<rect x="628" y="124" width="64" height="40" rx="7" fill="#E6EEF7" stroke="#185FA5"/><text x="660" y="148" text-anchor="middle" font-size="9" font-weight="700" fill="#1d3a5f">LLM</text>
<line x1="692" y1="144" x2="708" y2="144" stroke="#444441" stroke-width="1.5" marker-end="url(#d)"/>
<rect x="708" y="124" width="78" height="40" rx="7" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1.3"/><text x="747" y="148" text-anchor="middle" font-size="9" font-weight="700" fill="#0F6E56">Answer</text>

<rect x="20" y="174" width="780" height="38" rx="8" fill="#FFF6E6" stroke="#eed79f"/>
<text x="34" y="190" font-size="9" fill="#854F0B">★ You search by <tspan font-weight="700">vector</tspan>, but you pass the <tspan font-weight="700">text + metadata</tspan> to the LLM — the vector was only the index to find the chunk.</text>
<text x="34" y="205" font-size="9" fill="#854F0B">★ The LLM only sees what you retrieved — <tspan font-weight="700">retrieval quality is the ceiling on answer quality.</tspan></text>

<!-- SECTION 2: swappable search store -->
<rect x="20" y="224" width="780" height="22" rx="6" fill="#1d3a5f"/>
<text x="34" y="240" font-size="10.5" font-weight="700" fill="#FFFFFF">② The "Search store" step is swappable — same flow, different technique inside</text>

<rect x="300" y="256" width="52" height="26" rx="6" fill="#FFFFFF" stroke="#1d3a5f" stroke-width="1.2"/><text x="326" y="273" text-anchor="middle" font-size="8" font-weight="700" fill="#1d3a5f">query</text>
<line x1="352" y1="269" x2="366" y2="269" stroke="#444441" stroke-width="1.4" marker-end="url(#d)"/>
<rect x="368" y="252" width="104" height="34" rx="7" fill="#E6EEF7" stroke="#185FA5" stroke-width="1.8"/><text x="420" y="266" text-anchor="middle" font-size="8.5" font-weight="700" fill="#1d3a5f">SEARCH STORE</text><text x="420" y="278" text-anchor="middle" font-size="7.5" fill="#185FA5">pick a technique ↓</text>
<line x1="472" y1="269" x2="486" y2="269" stroke="#444441" stroke-width="1.4" marker-end="url(#d)"/>
<rect x="488" y="256" width="52" height="26" rx="6" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1.2"/><text x="514" y="273" text-anchor="middle" font-size="8" font-weight="700" fill="#0F6E56">top-K</text>

<line x1="420" y1="286" x2="420" y2="298" stroke="#185FA5" stroke-width="1.3"/>
<line x1="112" y1="298" x2="697" y2="298" stroke="#185FA5" stroke-width="1.3"/>
<line x1="112" y1="298" x2="112" y2="310" stroke="#185FA5" stroke-width="1.3" marker-end="url(#b)"/>
<line x1="307" y1="298" x2="307" y2="310" stroke="#185FA5" stroke-width="1.3" marker-end="url(#b)"/>
<line x1="502" y1="298" x2="502" y2="310" stroke="#185FA5" stroke-width="1.3" marker-end="url(#b)"/>
<line x1="697" y1="298" x2="697" y2="310" stroke="#185FA5" stroke-width="1.3" marker-end="url(#b)"/>

<!-- card 1: dense -->
<rect x="20" y="312" width="185" height="160" rx="9" fill="#FFFFFF" stroke="#1D9E75" stroke-width="1.4"/>
<rect x="20" y="312" width="185" height="20" rx="9" fill="#E1F5EE"/><rect x="20" y="322" width="185" height="10" fill="#E1F5EE"/>
<text x="32" y="326" font-size="9.5" font-weight="700" fill="#0F6E56">Dense (semantic)</text>
<text x="32" y="348" font-size="8.5" font-weight="700" fill="#444441">matches by MEANING</text>
<circle cx="54" cy="398" r="2.4" fill="#5F5E5A"/>
<line x1="54" y1="398" x2="96" y2="364" stroke="#185FA5" stroke-width="1.8" marker-end="url(#b)"/>
<line x1="54" y1="398" x2="104" y2="382" stroke="#1D9E75" stroke-width="1.8" marker-end="url(#g)"/>
<path d="M78 380 A 26 26 0 0 0 84 372" fill="none" stroke="#888780" stroke-width="1"/>
<text x="100" y="360" font-size="6.5" fill="#185FA5">query</text>
<text x="110" y="384" font-size="6.5" fill="#0F6E56">chunk</text>
<text x="120" y="400" font-size="7.5" font-weight="700" fill="#444441">small angle</text>
<text x="120" y="410" font-size="7.5" fill="#5F5E5A">= similar</text>
<text x="32" y="430" font-size="8" fill="#5F5E5A">closer angle ⇒ closer meaning</text>
<text x="32" y="441" font-size="8" fill="#5F5E5A">(measured by cosine)</text>
<text x="32" y="460" font-size="8" class="an">good for: paraphrases, concepts</text>

<!-- card 2: sparse -->
<rect x="215" y="312" width="185" height="160" rx="9" fill="#FFFFFF" stroke="#B0700A" stroke-width="1.4"/>
<rect x="215" y="312" width="185" height="20" rx="9" fill="#FAEEDA"/><rect x="215" y="322" width="185" height="10" fill="#FAEEDA"/>
<text x="227" y="326" font-size="9.5" font-weight="700" fill="#854F0B">Sparse (keyword)</text>
<text x="227" y="348" font-size="8.5" font-weight="700" fill="#444441">matches EXACT terms</text>
<rect x="227" y="354" width="160" height="42" rx="4" fill="#FCFAF5" stroke="#e7c98c"/>
<text x="233" y="365" font-size="6.5" font-weight="700" fill="#854F0B">inverted index:  word → chunks with it</text>
<text x="233" y="377" font-size="7.5" class="mono" fill="#444441"><tspan font-weight="700" fill="#B0700A">"MRI"</tspan>   → c3, c7</text>
<text x="233" y="389" font-size="7.5" class="mono" fill="#444441">"spine" → c7, c9</text>
<text x="227" y="412" font-size="8" fill="#5F5E5A">like a book's index, reversed</text>
<text x="227" y="423" font-size="8" fill="#5F5E5A"><tspan font-weight="700" fill="#B0700A">BM25</tspan> ranks by how often &amp; how rare</text>
<text x="227" y="442" font-size="8" class="an">good for: names, codes, IDs</text>

<!-- card 3: hybrid -->
<rect x="410" y="312" width="185" height="160" rx="9" fill="#FFFFFF" stroke="#185FA5" stroke-width="1.6"/>
<rect x="410" y="312" width="185" height="20" rx="9" fill="#E6EEF7"/><rect x="410" y="322" width="185" height="10" fill="#E6EEF7"/>
<text x="422" y="326" font-size="9.5" font-weight="700" fill="#1d3a5f">Hybrid</text>
<text x="422" y="348" font-size="8.5" font-weight="700" fill="#444441">run BOTH, fuse the lists</text>
<text x="424" y="361" font-size="6.5" fill="#888780">dense</text>
<rect x="422" y="364" width="26" height="11" rx="2" fill="#E1F5EE" stroke="#5DCAA5"/><text x="435" y="372" text-anchor="middle" font-size="7" class="mono" fill="#0F6E56">c7</text>
<rect x="422" y="377" width="26" height="11" rx="2" fill="#E1F5EE" stroke="#5DCAA5"/><text x="435" y="385" text-anchor="middle" font-size="7" class="mono" fill="#0F6E56">c3</text>
<text x="456" y="361" font-size="6.5" fill="#888780">keyword</text>
<rect x="456" y="364" width="26" height="11" rx="2" fill="#FAEEDA" stroke="#e7c98c"/><text x="469" y="372" text-anchor="middle" font-size="7" class="mono" fill="#854F0B">c3</text>
<rect x="456" y="377" width="26" height="11" rx="2" fill="#FAEEDA" stroke="#e7c98c"/><text x="469" y="385" text-anchor="middle" font-size="7" class="mono" fill="#854F0B">c1</text>
<line x1="486" y1="377" x2="498" y2="377" stroke="#444441" stroke-width="1.3" marker-end="url(#d)"/>
<text x="514" y="361" font-size="6.5" font-weight="700" fill="#185FA5">fused</text>
<rect x="506" y="364" width="26" height="11" rx="2" fill="#E6EEF7" stroke="#185FA5"/><text x="519" y="372" text-anchor="middle" font-size="7" class="mono" fill="#1d3a5f">c3</text>
<rect x="506" y="377" width="26" height="11" rx="2" fill="#E6EEF7" stroke="#185FA5"/><text x="519" y="385" text-anchor="middle" font-size="7" class="mono" fill="#1d3a5f">c7</text>
<text x="422" y="412" font-size="8" fill="#5F5E5A"><tspan font-weight="700" fill="#185FA5">RRF</tspan> = blend each item's rank</text>
<text x="422" y="423" font-size="8" fill="#5F5E5A">in both lists into one score</text>
<text x="422" y="440" font-size="8" class="an">good for: most real workloads</text>
<text x="422" y="458" font-size="8" font-weight="700" fill="#185FA5">★ common in production</text>

<!-- card 4: hybrid + rerank -->
<rect x="605" y="312" width="185" height="160" rx="9" fill="#FFFFFF" stroke="#7B3FA0" stroke-width="1.6"/>
<rect x="605" y="312" width="185" height="20" rx="9" fill="#F0E8F8"/><rect x="605" y="322" width="185" height="10" fill="#F0E8F8"/>
<text x="617" y="326" font-size="9.5" font-weight="700" fill="#7B3FA0">Hybrid + re-rank</text>
<text x="617" y="348" font-size="8.5" font-weight="700" fill="#444441">fuse, then re-score top few</text>
<rect x="613" y="366" width="20" height="11" rx="2" fill="#EFefea" stroke="#c9c6bc"/><text x="623" y="374" text-anchor="middle" font-size="7" class="mono" fill="#444441">c3</text>
<rect x="635" y="366" width="20" height="11" rx="2" fill="#EFefea" stroke="#c9c6bc"/><text x="645" y="374" text-anchor="middle" font-size="7" class="mono" fill="#444441">c7</text>
<rect x="657" y="366" width="20" height="11" rx="2" fill="#EFefea" stroke="#c9c6bc"/><text x="667" y="374" text-anchor="middle" font-size="7" class="mono" fill="#444441">c9</text>
<line x1="679" y1="371" x2="689" y2="371" stroke="#444441" stroke-width="1.3" marker-end="url(#d)"/>
<rect x="691" y="363" width="40" height="16" rx="4" fill="#F0E8F8" stroke="#7B3FA0"/><text x="711" y="374" text-anchor="middle" font-size="7" font-weight="700" fill="#7B3FA0">re-rank</text>
<line x1="733" y1="371" x2="743" y2="371" stroke="#444441" stroke-width="1.3" marker-end="url(#d)"/>
<rect x="745" y="366" width="20" height="11" rx="2" fill="#F0E8F8" stroke="#7B3FA0"/><text x="755" y="374" text-anchor="middle" font-size="7" class="mono" fill="#7B3FA0">c7</text>
<text x="617" y="412" font-size="8" fill="#5F5E5A">a <tspan font-weight="700" fill="#7B3FA0">cross-encoder</tspan> reads</text>
<text x="617" y="423" font-size="8" fill="#5F5E5A">(query + chunk) together, re-orders</text>
<text x="617" y="440" font-size="8" class="an">good for: top precision</text>
<text x="617" y="458" font-size="8" font-weight="700" fill="#7B3FA0">★ the prod-grade default</text>

<!-- SECTION 3: strategies (one-liners) -->
<rect x="20" y="484" width="780" height="22" rx="6" fill="#1d3a5f"/>
<text x="34" y="500" font-size="10.5" font-weight="700" fill="#FFFFFF">③ Strategies to make retrieval better — four stages (next week's topic)</text>

<rect x="20" y="514" width="185" height="52" rx="9" fill="#FFFFFF" stroke="#7B3FA0" stroke-width="1.3"/>
<text x="32" y="530" font-size="9.5" font-weight="700" fill="#7B3FA0">Improve the query</text>
<text x="32" y="542" font-size="7.5" class="an">before the search</text>
<text x="32" y="558" font-size="8" fill="#444441">rewrite · expand · multi-query · HyDE</text>

<rect x="215" y="514" width="185" height="52" rx="9" fill="#FFFFFF" stroke="#185FA5" stroke-width="1.3"/>
<text x="227" y="530" font-size="9.5" font-weight="700" fill="#1d3a5f">Match candidates</text>
<text x="227" y="542" font-size="7.5" class="an">the search itself</text>
<text x="227" y="558" font-size="8" fill="#444441">dense · sparse · hybrid  (see above ↑)</text>

<rect x="410" y="514" width="185" height="52" rx="9" fill="#FFFFFF" stroke="#B0700A" stroke-width="1.3"/>
<text x="422" y="530" font-size="9.5" font-weight="700" fill="#854F0B">Refine the results</text>
<text x="422" y="542" font-size="7.5" class="an">after the search</text>
<text x="422" y="558" font-size="8" fill="#444441">re-rank · filter · de-dup (MMR)</text>

<rect x="605" y="514" width="185" height="52" rx="9" fill="#FFFFFF" stroke="#1D9E75" stroke-width="1.3"/>
<text x="617" y="530" font-size="9.5" font-weight="700" fill="#0F6E56">Shape the context</text>
<text x="617" y="542" font-size="7.5" class="an">what the LLM sees</text>
<text x="617" y="558" font-size="8" fill="#444441">top-K · small-to-big · compress</text>

<!-- bottom line -->
<rect x="20" y="578" width="780" height="38" rx="9" fill="#1d3a5f"/>
<text x="410" y="595" text-anchor="middle" font-size="9.5" font-weight="700" fill="#FFFFFF">Start with semantic top-K; hybrid (often + a re-ranker) is the common production choice.</text>
<text x="410" y="609" text-anchor="middle" font-size="8.5" fill="#bcd3ee">Each added layer costs latency &amp; money — add it because a real miss demands it, not by default.</text>
</svg>
