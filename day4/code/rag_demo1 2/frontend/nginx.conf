server {
    listen 80;
    client_max_body_size 25m;   # allow PDF uploads to pass through

    # API calls go to the backend container.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 130s;
    }

    # Static page + the bundled sample PDF.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
